<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Space Terminal">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Tienda de Ropa - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans text-white">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-indigo-400">Punto de Venta</h1>
            <p class="text-slate-400 text-sm mt-2">Ingresá tus credenciales para abrir la caja</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Correo Electrónico</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition text-white"
                    placeholder="empleado@tienda.com">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Contraseña</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 transition text-white"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200 transform active:scale-95 shadow-lg shadow-indigo-600/30">
                Iniciar Sesión
            </button>
        </form>

        <div id="mensaje" class="mt-4 text-center text-sm font-semibold hidden"></div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
