<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Space Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animación fluida para la aparición de los modales */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.15s ease-out forwards;
        }
        /* Personalización de la barra de scroll para el estilo oscuro */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-indigo-500/30">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="mb-8 border-b border-slate-900 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                    📦 CONTROL DE INVENTARIO
                </h1>
                <p class="text-xs text-slate-400 mt-1">Administración central de catálogo, prendas y stock crítico.</p>
            </div>
            
            <button onclick="abrirModalAgregar()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2.5 rounded-lg border border-indigo-500/30 transition-colors shadow-lg shadow-indigo-500/20 flex items-center gap-2 cursor-pointer">
                ✨ Agregar Producto
            </button>
        </header>

        <div class="bg-slate-900/40 border border-slate-900 p-4 rounded-xl mb-6 flex flex-col sm:flex-row gap-3">
            <div class="flex-1 relative">
                <input type="text" id="inputBuscarProducto" placeholder="Buscar por nombre o etiqueta..." 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-3 pr-10 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
            <div class="w-full sm:w-48">
                <select id="selectFiltroCategoria" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors cursor-pointer">
                    <option value="">Todas las Categorías</option>
                    <option value="Jeans">Jeans</option>
                    <option value="Remeras">Remeras</option>
                    <option value="Camisas">Camisas</option>
                    <option value="Camperas">Camperas</option>
                </select>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800/80 rounded-xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-950/60 border-b border-slate-800 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                            <th class="p-4">Detalle del Producto</th>
                            <th class="p-4">Categoría</th>
                            <th class="p-4">Costo</th>
                            <th class="p-4">Precio Venta</th>
                            <th class="p-4 text-center">Stock Disp.</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductosBody" class="divide-y divide-slate-800/40">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-slate-500 italic text-sm">
                                Cargando catálogo base del sistema...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalVariantes" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform transition-all animate-fade-in">
            <div class="p-4 border-b border-slate-800 bg-slate-950/50 flex justify-between items-center">
                <div>
                    <h3 id="modalVariantesTitulo" class="text-base font-bold text-white">Detalle de Variantes</h3>
                    <p id="modalVariantesSubtitulo" class="text-xs text-indigo-400 font-medium"></p>
                </div>
                <button onclick="cerrarModalVariantes()" class="text-slate-400 hover:text-white transition-colors text-xl p-1 cursor-pointer">&times;</button>
            </div>
            <div class="p-4 max-h-[50vh] overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                            <th class="pb-2">Talle</th>
                            <th class="pb-2">Color</th>
                            <th class="pb-2 text-right">Stock</th>
                        </tr>
                    </thead>
                    <tbody id="modalVariantesBody" class="text-sm divide-y divide-slate-800/30">
                        </tbody>
                </table>
            </div>
            <div class="p-3 bg-slate-950/40 border-t border-slate-800 text-right">
                <button onclick="cerrarModalVariantes()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2 rounded-lg border border-slate-700 transition-colors cursor-pointer">
                    Cerrar Ventana
                </button>
            </div>
        </div>
    </div>

    <div id="modalAgregar" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform transition-all animate-fade-in">
            <div class="p-4 border-b border-slate-800 bg-slate-950/50 flex justify-between items-center">
                <div>
                    <h3 class="text-base font-bold text-white">Nuevo Producto</h3>
                    <p class="text-xs text-slate-400">Ingresá los parámetros base para el catálogo</p>
                </div>
                <button onclick="cerrarModalAgregar()" class="text-slate-400 hover:text-white transition-colors text-xl p-1 cursor-pointer">&times;</button>
            </div>
            <form id="formAgregarProducto" onsubmit="guardarNuevoProducto(event)" class="p-4 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Nombre del Producto</label>
                    <input type="text" id="addNombre" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="Ej: Jeans Slim Fit Gris">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Precio de Venta ($)</label>
                        <input type="number" id="addPrecio" required min="0" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white font-mono focus:outline-none focus:border-indigo-500 transition-colors" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Categoría</label>
                        <input type="text" id="addCategoria" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="Ej: Jeans">
                    </div>
                </div>

                <div class="pt-2 flex justify-end gap-2 border-t border-slate-800/60 mt-4">
                    <button type="button" onclick="cerrarModalAgregar()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2 rounded-lg border border-slate-700 transition-colors cursor-pointer">
                        Cancelar
                    </button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors cursor-pointer">
                        Guardar Producto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="productos.js"></script>
</body>
</html>
